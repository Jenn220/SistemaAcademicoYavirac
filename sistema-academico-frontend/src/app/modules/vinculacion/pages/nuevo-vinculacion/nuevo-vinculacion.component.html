
  <div class="form-shell">
    <div class="form-card">
    <div class="form-header">
      <h1>Nuevo proyecto de vinculación</h1>
      <a routerLink="/vinculacion" class="btn-link">← Volver</a>
    </div>

    <form (ngSubmit)="guardarProyecto()" #nuevoProyectoForm="ngForm">
      <div class="form-grid">
        <label>
          <span>Nombre del proyecto</span>
          <input [(ngModel)]="model.nombre_proyecto" name="nombre_proyecto" required />
        </label>

        <label>
          <span>Periodo</span>
          <select [(ngModel)]="model.id_periodo" name="id_periodo" required>
            <option *ngFor="let periodo of periodos" [ngValue]="periodo.id">{{ periodo.nombre }}</option>
          </select>
        </label>

        <label>
          <span>Matrícula</span>
          <select [(ngModel)]="model.id_matricula_detalle" name="id_matricula_detalle" required>
            <option *ngFor="let matricula of matriculas" [ngValue]="matricula.id">{{ matricula.nombre }}</option>
          </select>
        </label>

        <label>
          <span>Empresa</span>
          <select [(ngModel)]="model.id_empresa" name="id_empresa" required>
            <option *ngFor="let empresa of empresas" [ngValue]="empresa.id">{{ empresa.nombre }}</option>
          </select>
        </label>

        <label>
          <span>Docente</span>
          <select [(ngModel)]="model.id_docente" name="id_docente" required>
            <option *ngFor="let docente of docentes" [ngValue]="docente.id">{{ docente.nombre }}</option>
          </select>
        </label>

        <label>
          <span>Fecha inicio</span>
          <input type="date" [(ngModel)]="model.fecha_inicio" name="fecha_inicio" required />
        </label>

        <label>
          <span>Fecha fin</span>
          <input type="date" [(ngModel)]="model.fecha_fin" name="fecha_fin" required />
        </label>

        <label>
          <span>Horas estudiante</span>
          <input type="number" [(ngModel)]="model.total_horas_estudiante" name="total_horas_estudiante" />
        </label>

        <label>
          <span>Horas docente</span>
          <input type="number" [(ngModel)]="model.total_horas_docente" name="total_horas_docente" />
        </label>

        <label>
          <span>Estado</span>
          <select [(ngModel)]="model.estado" name="estado">
            <option *ngFor="let estado of estados" [value]="estado">{{ estado }}</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button type="submit" [disabled]="isSubmitting || nuevoProyectoForm.invalid">{{ isSubmitting ? 'Guardando...' : 'Guardar proyecto' }}</button>
      </div>

      <p class="feedback success" *ngIf="mensaje">{{ mensaje }}</p>
      <p class="feedback error" *ngIf="error">{{ error }}</p>
    </form>
    </div>
  </div>

services:
  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - academico_private

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    security_opt:
      - no-new-privileges:true

  migrations:
    build:
      context: ./sistema-academico-backend
      dockerfile: Dockerfile
      target: build

    restart: "no"

    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

    command:
      [
        "npx",
        "typeorm",
        "migration:run",
        "-d",
        "dist/database/data-source.js"
      ]

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - academico_private

    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./sistema-academico-backend
      dockerfile: Dockerfile
      target: runtime

    restart: unless-stopped

    environment:
      NODE_ENV: development
      PORT: 3000

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}

      CORS_ORIGIN: http://localhost:4200
      APP_VERSION: ${APP_VERSION:-1.0.0}
      COMMIT_SHA: ${COMMIT_SHA:-local}

    ports:
      - "3000:3000"

    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

    networks:
      - academico_private

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./sistema-academico-frontend
      dockerfile: Dockerfile.dev

    restart: unless-stopped

    working_dir: /app

    ports:
      - "4200:4200"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - academico_private

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4200').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    name: sistema_academico_postgres_data

networks:
  academico_private:
    name: sistema_academico_private
    driver: bridge